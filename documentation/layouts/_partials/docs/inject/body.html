<script>
  (() => {
    const toc = document.querySelector('.book-toc nav#TableOfContents');
    const article = document.querySelector('.book-article');
    if (!toc || !article) return;

    const links = Array.from(toc.querySelectorAll('a[href^="#"]'));
    const headings = links
      .map((link) => {
        const id = decodeURIComponent(link.getAttribute('href').slice(1));
        const node = document.getElementById(id);
        return node ? { id, link, node } : null;
      })
      .filter(Boolean);

    if (!headings.length) return;

    const setActive = (id) => {
      for (const { link } of headings) {
        link.classList.toggle('active-section', decodeURIComponent(link.getAttribute('href').slice(1)) === id);
      }
    };

    const observer = new IntersectionObserver(
      (entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);

        if (visible.length > 0) {
          setActive(visible[0].target.id);
          return;
        }

        const passed = headings
          .filter(({ node }) => node.getBoundingClientRect().top <= 140)
          .at(-1);

        if (passed) setActive(passed.id);
      },
      {
        rootMargin: '-96px 0px -70% 0px',
        threshold: [0, 1]
      }
    );

    for (const { node } of headings) observer.observe(node);

    const fromHash = () => {
      const id = decodeURIComponent(window.location.hash.replace(/^#/, ''));
      if (id) setActive(id);
    };

    window.addEventListener('hashchange', fromHash);
    fromHash();
    if (!window.location.hash) setActive(headings[0].id);
  })();
</script>
