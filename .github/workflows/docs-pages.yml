name: Deploy Docs

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.kt"
      - "**/*.md"
      - "**/*.gradle.kts"
      - "gradle.properties"
      - "settings.gradle.kts"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: asoft-ltd/home
          token: ${{ secrets.GH_TOKEN_ANDY }}
          fetch-depth: 1
          submodules: true
          path: home

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate Dokka site
        working-directory: home/majestic
        run: ./gradlew :dokkaGeneratePublicHtml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: home/majestic/build/dokka/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4